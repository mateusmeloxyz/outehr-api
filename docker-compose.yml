services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: outehr-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Developer
      - MSSQL_AGENT_ENABLED=true
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - outehr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: outehr-api
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=OutEHR;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True
    ports:
      - "5000:8080"
    networks:
      - outehr-network
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver-data:
    driver: local

networks:
  outehr-network:
    driver: bridge
